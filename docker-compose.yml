services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    command: redis-server --appendonly yes
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://portfolio:portfolio@postgres:5432/portfolio?schema=public}
      REDIS_URL: redis://redis:6379
      PORT: 4000
      WEB_ORIGIN: http://localhost:3001
      OUTGOING_WEBHOOK_URL: ${OUTGOING_WEBHOOK_URL:-}
      OUTGOING_WEBHOOK_SECRET: ${OUTGOING_WEBHOOK_SECRET:-}
      INCOMING_WEBHOOK_SECRET: ${INCOMING_WEBHOOK_SECRET:-}
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    environment:
      INTERNAL_API_URL: http://api:4000/api/v1
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports: ["3001:3001"]
    depends_on: [api]
  worker:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    command: npm run start:worker -w @portfolio/api
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://portfolio:portfolio@postgres:5432/portfolio?schema=public}
      REDIS_URL: redis://redis:6379
      OUTGOING_WEBHOOK_URL: ${OUTGOING_WEBHOOK_URL:-}
      OUTGOING_WEBHOOK_SECRET: ${OUTGOING_WEBHOOK_SECRET:-}
      INCOMING_WEBHOOK_SECRET: ${INCOMING_WEBHOOK_SECRET:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
volumes:
  postgres_data:
  redis_data:
