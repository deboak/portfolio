services:
  - type: web
    name: portfolio-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build -w @portfolio/api
    startCommand: npm run db:migrate:deploy -w @portfolio/api && npm run start -w @portfolio/api
    initialDeployHook: npm run db:seed
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false
      - key: OUTGOING_WEBHOOK_URL
        sync: false
      - key: OUTGOING_WEBHOOK_SECRET
        sync: false
      - key: INCOMING_WEBHOOK_SECRET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_RESUME_KEY
        sync: false
      - key: DATABASE_POOL_MAX
        value: 10
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER_IN_API
        value: true
