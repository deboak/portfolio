services:
  - type: web
    name: portfolio-api-staging
    runtime: node
    plan: free
    branch: develop
    buildCommand: npm ci && npm run db:generate && npm run build -w @portfolio/api
    startCommand: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && npm run start -w @portfolio/api
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER_IN_API
        value: true
      - key: DATABASE_POOL_MAX
        value: 5
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: INCOMING_WEBHOOK_SECRET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: SENTRY_DSN
        sync: false
