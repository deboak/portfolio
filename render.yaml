services:
  - type: web
    name: portfolio-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build -w @portfolio/api
    startCommand: npm run start -w @portfolio/api
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: DATABASE_POOL_MAX
        value: 10
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER_IN_API
        value: true
